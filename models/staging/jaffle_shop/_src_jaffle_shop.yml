sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: Clone of postgres application database
    tables:
      - name: customers
        columns:
          - name: id
            description: primary key for customer data.
            data_tests:
              - unique
              - not_null      
      - name: orders
        description: Raw orders data.
        columns:
          - name: id
            description: primary key for orders data

        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 1
              period: day
          loaded_at_field: _etl_loaded_at